    <script>
      const developerCode = document.querySelector("#developer-code");
      const codeText = `// 欢迎来到我的博客世界

const developer = {
  name: '止鹜',
  skills: ['嵌入式', 'AI编程', '上位机', '技术开发'],
  goal: '成为一名全面能力的人！'
};

// 开启学习之旅
developer.learn = () => {
  console.log('学习永无止步!');
};`;

      let codeIndex = 0;

      function typeDeveloperCode() {
        if (!developerCode || codeIndex > codeText.length) {
          return;
        }

        developerCode.textContent = codeText.slice(0, codeIndex);
        codeIndex += 1;
        window.setTimeout(typeDeveloperCode, codeText[codeIndex - 1] === "\n" ? 260 : 38);
      }

      typeDeveloperCode();
    </script>
